#路径

#YAML 只支持列表（sequence）、字典（mapping）、字符串、数字 布尔等基本类型
#使用科学计数法表示小数时 需要e前面用浮点数表示
paths:
    train_dir: "./imgs/train"
    val_dir: "./imgs/val"
    test_dir: "./imgs/test"
    checkpoint_dir: "./checkpoint"

# 基础训练配置
train:
    epochs: 120               # 训练总轮数
    optimizer_name: "sgd"         # 优化器类型: adam, sgd
    device: 'mps'             # mps cpu cuda
    resume: False            
    lrsche_name: 'reduce'       # cosin ,reduce      
    label_smoothing: 0.1

    sgd:
        lr: 0.03
        momentum: 0.9
        weight_decay: 0.0001

    adam:
        lr: 0.01
        betas: [0.9,0.999]
        weight_decay: 1.0e-4    # 浮点数表示

                              
dataset:
    dataloaderparams:
        batch_size: 64           # 每批训练样本数
        num_workers: 8            # 多进程
# 下面两个权重设置 可以都为False 对于较轻的类别不均衡 采样设置True,loss设置False
# 对于严重的类别不均衡 采样设置为False,loss设置为True  loss为true时 会覆盖sampling
    use_sampling_weight: True             # 是否权重采样 (训练时)
    use_loss_weight: False         # 计算loss时 是否应用权重 

# 模型相关参数
model:
    name: "DenseNet"            # 可选: ResNet, DenseNet ,PretrainedResnet18,PretrainedDensenet121
    num_classes: 10         # 动物类别数量
    

# 数据预处理参数 (对应 utils/pretreatment.py)
preprocessing:
    shape: [224, 224]        # 图像缩放尺寸
    use_letter: True
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

finetune:
    strategy: null      # 是否启用全参数微调: null为不启用， epoch表示N个epoch 意思是 N个epoch之后开启全量微调 
    backbone_lr: 0.0001   #acc 表示使用准确率 内部维护了一个maxlen的deque 意思是根据准确率经过maxlen之后没有提升 
    head_lr: 0.001       # 动态的开启全量微调 
    maxlen: 15
    epoch: 2




