#路径
paths:
    train_dir: "./imgs/train"
    val_dir: "./imgs/val"
    test_dir: "./imgs/test"
    checkpoint_dir: "./checkpoint"

# 基础训练配置
train:
    epochs: 120               # 训练总轮数
    learning_rate: 0.01      # 学习率
    optimizer_name: "sgd"         # 优化器类型: adam, sgd
    device: 'mps'             # mps cpu cuda
    resume: False            
    lrsche_name: 'reduce'       # cosin ,reduce         
                              
dataset:
    dataloaderparams:
        batch_size: 64           # 每批训练样本数
        num_workers: 4            # 多进程
# 下面两个权重设置 可以都为False 对于较轻的类别不均衡 采样设置True,loss设置False
# 对于严重的类别不均衡 采样设置为False,loss设置为True  loss为true时 会覆盖sampling
    use_sampling_weight: True             # 是否权重采样 (训练时)
    use_loss_weight: False         # 计算loss时 是否应用权重 

# 模型相关参数
model:
    name: "PretrainedDensenet121"            # 可选: ResNet, DenseNet ,PretrainedResnet18,PretrainedDensenet121
    num_classes: 10         # 动物类别数量
    

# 数据预处理参数 (对应 utils/pretreatment.py)
preprocessing:
    shape: [224, 224]        # 图像缩放尺寸
    use_letter: True
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

finetune:
    strategy: "epoch"          # 是否启用全参数微调: None epoch acc
    head_lr: 0.001
    backbone_lr: 0.00001
    maxlen: 15
    epoch: 2




